services:
  mysql:
    image: mysql:8.0
    container_name: vip-lounge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: vip_lounge_2024
      MYSQL_DATABASE: vip_lounge
      MYSQL_USER: vip_lounge
      MYSQL_PASSWORD: vip_lounge_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vip-lounge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vip-lounge-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vip_lounge?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: vip_lounge
      SPRING_DATASOURCE_PASSWORD: vip_lounge_2024
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vip-lounge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vip-lounge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vip-lounge-network

volumes:
  mysql-data:

networks:
  vip-lounge-network:
    driver: bridge
